<!DOCTYPE html>
<html>
<head>
    <title>RFID Access - Status</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; margin: 0; }
        nav { background: #16213e; padding: 15px 30px; display: flex; gap: 20px; align-items: center; }
        nav a { color: #e94560; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #fff; }
        .container { padding: 30px; }
        h2 { color: #e94560; }
        .cards { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .card { background: #16213e; padding: 30px; border-radius: 10px; min-width: 180px; text-align: center; }
        .card h3 { color: #aaa; margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; }
        .card .number { font-size: 48px; font-weight: bold; }
        .green { color: #4caf50; }
        .red { color: #e94560; }
        .blue { color: #2196f3; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/users">Users</a>
        <a href="/logs">Logs</a>
        <a href="/status">Status</a>
        <a href="/logout" style="margin-left: auto;">Logout</a>
    </nav>
    <div class="container">
        <h2>System Status</h2>
        <div class="cards">
            <div class="card">
                <h3>Active Users</h3>
                <div class="number blue">{{ active_users }}</div>
            </div>
            <div class="card">
                <h3>Granted (24h)</h3>
                <div class="number green">{{ granted_24h }}</div>
            </div>
            <div class="card">
                <h3>Denied (24h)</h3>
                <div class="number red">{{ failed_24h }}</div>
            </div>
        </div>
    </div>
</body>
</html>
